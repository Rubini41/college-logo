<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#f0f2f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:350px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
    text-align:center;
}

.logo{
    width:120px;
    height:120px;
    object-fit:contain;
    margin-bottom:15px;
}

h2{
    color:#003366;
    margin-bottom:20px;
}

label{
    display:block;
    text-align:left;
    margin-top:10px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    margin-top:20px;
    background:#003366;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}
</style>
</head>

<body>

<div class="container">

<img src="collegelogo.jpg" class="logo" alt="College Logo">

<h2>Adhiparasakthi Engineering College</h2>

<form>

<label>Student Name</label>
<input type="text" placeholder="Enter Student Name">

<label>Password</label>
<input type="password" placeholder="Enter Password">

<button type="button">Demo Login</button>

</form>

</div>

</body>
</html>
