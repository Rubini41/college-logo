<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADHIPARASAKTHI ENGINEERING COLLEGE</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            background:#f0f2f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-container{
            background:gold;
            padding:30px;
            border-radius:15px;
            width:350px;
            text-align:center;
            box-shadow:0 4px 15px rgba(0,0,0,0.2);
        }

        .logo{
            width:120px;
            height:auto;
            margin-bottom:15px;
        }

        h2{
            color:#003366;
            font-size:20px;
            margin-bottom:20px;
        }

        input{
            width:90%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        button{
            width:95%;
            padding:12px;
            background:#003366;
            color:gold;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0055aa;
        }
    </style>
</head>
<body>

<div class="login-container">

    <img src="collegelogo.jpg" alt="College Logo" class="logo">

    <h2>ADHIPARASAKTHI ENGINEERING COLLEGE</h2>

    <input type="text" placeholder="Username" required>

    <input type="password" placeholder="Password" required>

    <button>Login</button>

</div>

</body>
</html>
